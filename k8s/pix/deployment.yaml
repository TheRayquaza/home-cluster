kind: Deployment
apiVersion: apps/v1
metadata:
  name: pix-deployment
  labels:
    app: pix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pix
  template:
    metadata:
      labels:
        app: pix
    spec:
      containers:
        - name: pix
          image: ghcr.io/therayquaza/home-cluster/pix:0.1.2@sha256:22e25204d8b33eb509f925b2c6fd655dd56d6a8b3b97cd30b11b46b74dde5486
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
      # imagePullSecrets:
      #   - name: ghcr
