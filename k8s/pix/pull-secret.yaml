apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr
  namespace: pix
spec:
  refreshInterval: 10m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "therayquaza",
                "password": "{{ .GITHUB_TOKEN | toString }}",
                "auth": "{{ (printf "therayquaza:%s" .GITHUB_TOKEN) | b64enc }}"
              }
            }
          }
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: ghcr
        property: GITHUB_TOKEN
