apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: argocd-exception
  namespace: kyverno
spec:
  # argocd-redis and argocd-notifications-controller rely on pod-level securityContext
  # for runAsNonRoot/seccompProfile; per-container fields are now set in the manifests.
  # This exception is kept as a safety net during rolling rollouts until pods cycle.
  exceptions:
  - policyName: require-security-context
    ruleNames:
    - require-non-root
    - require-seccomp
    - autogen-require-non-root
    - autogen-require-seccomp
  match:
    any:
    - resources:
        namespaces: ["argocd"]
        selector:
          matchLabels:
            app.kubernetes.io/name: argocd-redis
    - resources:
        namespaces: ["argocd"]
        selector:
          matchLabels:
            app.kubernetes.io/name: argocd-notifications-controller
