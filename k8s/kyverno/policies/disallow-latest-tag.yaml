apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  # Audit only: latest tag causes unpredictable rollouts and hides image drift.
  validationFailureAction: Audit
  background: true
  rules:
  - name: disallow-latest-tag
    match:
      any:
      - resources:
          kinds: ["Pod"]
    exclude:
      any:
      - resources:
          namespaces: ["kube-system"]
    validate:
      message: "Images must use a specific tag or digest, not :latest"
      foreach:
      - list: "request.object.spec.[containers, initContainers][]"
        deny:
          conditions:
            any:
            - key: "{{ element.image }}"
              operator: Equals
              value: "*:latest"
            - key: "{{ element.image }}"
              operator: NotEquals
              value: "*:*"
