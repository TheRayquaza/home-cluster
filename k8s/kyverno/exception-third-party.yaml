apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: third-party-exception
  namespace: kyverno
spec:
  exceptions:
  - policyName: require-security-context
    ruleNames:
    - require-non-root
    - require-no-privilege-escalation
    - require-seccomp
    - require-drop-all-caps
  - policyName: require-readonly-rootfs
    ruleNames: ["require-readonly-rootfs"]
  match:
    any:
    # immich: upstream images run as root and write to filesystem
    - resources:
        kinds: ["Pod"]
        namespaces: ["immich"]
        selector:
          matchLabels:
            app: immich
    # pinchflat: community image, writes to /config and /downloads
    - resources:
        kinds: ["Pod"]
        namespaces: ["pinchflat"]
        selector:
          matchLabels:
            app: pinchflat
    # uptime-kuma: writes SQLite to /app/data
    - resources:
        kinds: ["Pod"]
        namespaces: ["uptime-kuma"]
        selector:
          matchLabels:
            app: uptime-kuma
    # games-frontend: nginx:alpine v0.2.0 replaced by nginx-unprivileged in v0.3.0
    # remove this entry once v0.3.0 image is deployed
    - resources:
        kinds: ["Pod", "Deployment", "ReplicaSet"]
        namespaces: ["games"]
        selector:
          matchLabels:
            app: games-frontend
