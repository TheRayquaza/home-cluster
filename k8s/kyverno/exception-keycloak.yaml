apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: keycloak-seccomp-exception
  namespace: kyverno
spec:
  # Keycloak/JVM socket operations fail with RuntimeDefault seccomp profile
  # (Infinispan internal sockets return EPERM on certain syscalls)
  exceptions:
  - policyName: require-security-context
    ruleNames: ["require-seccomp"]
  match:
    any:
    - resources:
        kinds: ["Pod", "Deployment", "ReplicaSet"]
        namespaces: ["idp"]
        selector:
          matchLabels:
            app: keycloak
