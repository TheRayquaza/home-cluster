apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: falco-exception
  namespace: kyverno
spec:
  exceptions:
  - policyName: disallow-privileged-containers
    ruleNames:
    - disallow-privileged
    - autogen-disallow-privileged
  - policyName: disallow-host-namespaces
    ruleNames:
    - disallow-host-namespaces
    - autogen-disallow-host-namespaces
  - policyName: require-security-context
    ruleNames:
    - require-non-root
    - require-no-privilege-escalation
    - require-seccomp
    - require-drop-all-caps
    - autogen-require-non-root
    - autogen-require-no-privilege-escalation
    - autogen-require-seccomp
    - autogen-require-drop-all-caps
  - policyName: require-readonly-rootfs
    ruleNames:
    - require-readonly-rootfs
    - autogen-require-readonly-rootfs
  - policyName: require-resource-limits
    ruleNames:
    - require-limits
    - autogen-require-limits
  match:
    any:
    # falco daemonset — needs privileged + host namespaces for kernel-level syscall tracing
    - resources:
        kinds: ["Pod", "DaemonSet"]
        namespaces: ["falco"]
        selector:
          matchLabels:
            app.kubernetes.io/name: falco
    # falco-talon — response engine, runs as root to exec remediation actions
    - resources:
        kinds: ["Pod", "Deployment", "ReplicaSet"]
        namespaces: ["falco"]
        selector:
          matchLabels:
            app.kubernetes.io/name: falco-talon
