apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: idp
spec:
  parentRefs:
    - name: private-gateway
      namespace: default
      sectionName: keycloak-https
  hostnames:
    - keycloak.internal.rayq.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 80
