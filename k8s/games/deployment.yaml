apiVersion: apps/v1
kind: Deployment
metadata:
  name: games-backend
  namespace: games
  labels:
    app: games-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: games-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: games-backend
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: backend
          image: ghcr.io/therayquaza/home-cluster/games-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: games-config
            - secretRef:
                name: games-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/games
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/games
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30

        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: games
            - name: POSTGRES_USER
              value: games
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: games-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: games-postgres-data
