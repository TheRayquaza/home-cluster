apiVersion: apps/v1
kind: Deployment
metadata:
  name: games-backend
  namespace: games
  labels:
    app: games-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: games-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: games-backend
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: backend
          image: ghcr.io/therayquaza/home-cluster/games-backend:v0.1.1@sha256:592d1f75e86cced1c1718b55c5d10b695c23ebd8baa79700e0d3409d46db8377
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: games-config
            - secretRef:
                name: games-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
