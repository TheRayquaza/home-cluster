apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kommande-route
  namespace: kommande
spec:
  parentRefs:
    - name: private-gateway
      namespace: default
      sectionName: kommande-https
  hostnames:
    - kommande.internal.rayq.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kommande-service
          port: 8080
