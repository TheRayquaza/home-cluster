apiVersion: apps/v1
kind: Deployment
metadata:
  name: kommande
  namespace: kommande
  labels:
    app: kommande
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kommande
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kommande
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: kommande
          image: ghcr.io/therayquaza/home-cluster/kommande:0.3.1@sha256:f8cb8594c2218e65a02b6489f9cb70afc049bcadf3750b6d7f57ca0d0c7dda14
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: kommande-config
            - secretRef:
                name: kommande-secret
            - secretRef:
                name: kommande-oidc-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
