apiVersion: apps/v1
kind: Deployment
metadata:
  name: kommande
  namespace: kommande
  labels:
    app: kommande
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kommande
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kommande
    spec:
      containers:
        - name: kommande
          image: ghcr.io/therayquaza/home-cluster/kommande:0.2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kommande-config
            - secretRef:
                name: kommande-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30

        - name: mongodb
          image: docker.io/mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: kommande
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data

      imagePullSecrets:
        - name: ghcr
