apiVersion: apps/v1
kind: Deployment
metadata:
  name: kommande
  namespace: kommande
  labels:
    app: kommande
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kommande
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kommande
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: kommande
          image: ghcr.io/therayquaza/home-cluster/kommande:0.3.0@sha256:cdf6af9beb03f16d9bfe9d055de9d3dcd81a07ef9540f9e75d44e2a6ad343e07
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kommande-config
            - secretRef:
                name: kommande-secret
            - secretRef:
                name: kommande-oidc-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /auth/login
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/login
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
