services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: games
      POSTGRES_USER: games
      POSTGRES_PASSWORD: games
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U games"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://games:games@postgres:5432/games?sslmode=disable
      JWT_SECRET: dev-secret
      ALLOWED_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
