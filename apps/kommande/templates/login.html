{{define "content"}}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <h1 class="auth-title">Bienvenue sur Kommande</h1>
    <p class="auth-subtitle">Connectez-vous avec votre compte</p>

    <a href="/auth/login" class="btn btn-primary btn-full" style="display:block;text-align:center;text-decoration:none;margin-top:1.5rem;">
      Se connecter avec Keycloak
    </a>

    <p style="margin-top:1rem;text-align:center;font-size:0.875rem;color:var(--text-muted)">
      Pas encore de compte ? Créez-en un directement sur Keycloak lors de la connexion.
    </p>
  </div>
</div>
{{end}}
