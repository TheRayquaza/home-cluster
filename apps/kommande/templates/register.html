{{define "content"}}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Rejoignez Kommande</p>

    <form action="/register" method="POST" class="auth-form">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="votre nom" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="vous@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 caractères" autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
    </form>

    <p class="auth-link">Déjà un compte ? <a href="/login">Se connecter</a></p>
  </div>
</div>
{{end}}
