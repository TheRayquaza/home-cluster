{{define "content"}}
<div class="container page-section">
  <div class="page-header">
    <div>
      <h1 class="page-title">Modifier la catégorie</h1>
    </div>
    <a href="/admin/categories" class="btn btn-secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>
  </div>

  <div class="form-card">
    <form action="/admin/categories/{{.Data.ID.Hex}}" method="POST" enctype="multipart/form-data" class="article-form">
      <div class="form-group">
        <label for="name">Nom <span class="required">*</span></label>
        <input type="text" id="name" name="name" value="{{.Data.Name}}" required autofocus>
      </div>

      <div class="form-group">
        <label for="image">Image</label>
        {{if .Data.ImageID}}
        <div class="image-preview-current">
          <img src="/images/{{imageURL .Data.ImageID}}" alt="Image actuelle" class="image-preview-thumb">
          <p class="image-preview-label">Image actuelle — uploadez une nouvelle pour la remplacer</p>
        </div>
        {{end}}
        <div class="file-upload-area" id="file-upload-area">
          <input type="file" id="image" name="image" accept="image/*" class="file-input">
          <label for="image" class="file-upload-label">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span id="file-upload-text">Cliquer pour choisir une image (JPG, PNG, WEBP)</span>
          </label>
          <img id="image-preview" class="image-preview-new" style="display:none" alt="Aperçu">
        </div>
      </div>

      <div class="form-actions">
        <a href="/admin/categories" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
{{end}}
