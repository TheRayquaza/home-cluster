services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: kommande
      JWT_SECRET: change-me-in-production
      PORT: "5000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:8.2.6-rc0-noble
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data: