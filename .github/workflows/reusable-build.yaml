name: Reusable - Build and Push Image

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context path
        required: true
        type: string
      image-name:
        description: Full image name without tag (e.g. ghcr.io/owner/repo/app)
        required: true
        type: string
      tag-prefix:
        description: Git tag prefix to strip (e.g. "games-backend/")
        required: true
        type: string
    outputs:
      digest:
        description: Image digest (sha256:...)
        value: ${{ jobs.build.outputs.digest }}
      tag:
        description: Image tag extracted from git ref
        value: ${{ jobs.build.outputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag from git ref
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=match,pattern=${{ inputs.tag-prefix }}(.*),group=1

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
