name: Build - pix

on:
  push:
    tags:
      - "pix/v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      context: apps/pix
      image-name: ghcr.io/therayquaza/home-cluster/pix
      tag-prefix: "pix/"
    permissions:
      contents: read
      packages: write
