name: Template - Trivy Security Scan

on:
  workflow_call:
    inputs:
      scan-type:
        description: "fs (filesystem/Dockerfile) or image (container image)"
        required: true
        type: string
      target:
        description: "Directory path for fs, image ref for image"
        required: true
        type: string
      severity:
        description: Comma-separated severity levels to report
        required: false
        type: string
        default: "CRITICAL,HIGH"

jobs:
  trivy:
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: ${{ inputs.scan-type }}
          scan-ref: ${{ inputs.target }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
