name: Template - Docker Build

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context path
        required: true
        type: string
      image-name:
        description: Full image name without tag
        required: true
        type: string
      push:
        description: Push image to registry
        required: false
        type: boolean
        default: false
      tag-prefix:
        description: Git tag prefix to strip (e.g. "kommande/")
        required: false
        type: string
        default: ""
      platforms:
        description: Target platforms
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
    outputs:
      digest:
        description: Image digest (sha256:...)
        value: ${{ jobs.build.outputs.digest }}
      tags:
        description: Computed image tags
        value: ${{ jobs.build.outputs.tags }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=match,pattern=${{ inputs.tag-prefix }}(.*),group=1,enable=${{ inputs.tag-prefix != '' }}
            type=sha,prefix=pr-,enable=${{ !inputs.push }}

      - name: Build
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
