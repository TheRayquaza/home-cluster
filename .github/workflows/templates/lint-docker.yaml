name: Template - Dockerfile Lint

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile relative to repo root
        required: true
        type: string

jobs:
  hadolint:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          config: .hadolint.yaml
